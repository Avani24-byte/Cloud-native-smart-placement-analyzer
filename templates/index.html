<form action="/upload" method="POST" enctype="multipart/form-data">

    <input type="text"
           name="name"
           placeholder="Enter Name"
           required>

    <br><br>

    <input type="email"
           name="email"
           placeholder="Enter Email"
           required>

    <br><br>

    <input type="file"
           name="resume"
           required>

    <br><br>

    <button type="submit">
        Upload Resume
    </button>

</form>
