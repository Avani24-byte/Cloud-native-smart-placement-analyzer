<!DOCTYPE html>
<html>
<head>
    <title>Smart Placement Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f0f0f;
            color: #f0f0f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .upload-card {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.15);
        }

        h2 {
            font-weight: 700;
            color: #a78bfa;
        }

        .form-control, .form-select {
            background-color: #0f0f1a;
            border: 1px solid #3a3a5a;
            color: #f0f0f0;
            border-radius: 10px;
        }

        .form-control:focus, .form-select:focus {
            background-color: #0f0f1a;
            border-color: #7c3aed;
            color: #f0f0f0;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
        }

        .form-control::placeholder {
            color: #6b7280;
        }

        .form-select option {
            background-color: #1a1a2e;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #6d28d9, #4338ca);
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(124, 58, 237, 0.4);
        }

        label {
            color: #a78bfa;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .subtitle {
            color: #6b7280;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
<div class="upload-card">

    <h2 class="text-center mb-2">📄 Smart Placement Analyzer</h2>
    <p class="text-center subtitle mb-4">Upload your resume and get ATS score + skill analysis instantly</p>

    <form action="/upload" method="POST" enctype="multipart/form-data">

        <div class="mb-3">
            <label>FULL NAME</label>
            <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
        </div>

        <div class="mb-3">
            <label>EMAIL ADDRESS</label>
            <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
        </div>

        <div class="mb-3">
            <label>JOB ROLE</label>
            <select name="job_role" class="form-select">
                <option value="Software Engineer">Software Engineer</option>
                <option value="Web Development">Web Development</option>
                <option value="Cyber Security Analyst">Cyber Security Analyst</option>
                <option value="Cloud Engineer">Cloud Engineer</option>
            </select>
        </div>

        <div class="mb-4">
            <label>RESUME (PDF)</label>
            <input type="file" name="resume" class="form-control" accept=".pdf" required>
        </div>

        <button class="btn btn-primary w-100">
            Analyze Resume 🚀
        </button>

    </form>
</div>
</body>
</html>
