<!DOCTYPE html>
<html>
<head>
    <title>Smart Placement Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container mt-5">

    <div class="card shadow-lg p-4 upload-card">

        <h2 class="text-center mb-4">📄 Smart Placement Analyzer</h2>

        <p class="text-center text-muted">
            Upload your resume and get ATS score + skill analysis instantly
        </p>

        <form action="/upload" method="POST" enctype="multipart/form-data">

            <div class="mb-3">
                <input type="file" name="resume" class="form-control" required>
            </div>

            <div class="mb-3">
                <select name="job_role" class="form-select">
                    <option>Software Engineer</option>
                    <option>Data Analyst</option>
                    <option>Cyber Security Analyst</option>
                    <option>Cloud Engineer</option>
                </select>
            </div>

            <button class="btn btn-primary w-100">
                Analyze Resume 🚀
            </button>

        </form>
    </div>

</div>

</body>
</html>
